<!DOCTYPE html>
<html>
<body style="background:#111;color:#fff;font-family:Arial;padding:20px">

<h1>🔥 Hermes IA</h1>

<button onclick="abrir('chat')">Chat</button>
<button onclick="abrir('ebook')">Ebook</button>

<div id="chat">
  <h2>Chat IA</h2>
  <textarea id="msg"></textarea>
  <button onclick="chat()">Enviar</button>
</div>

<div id="ebook" style="display:none">
  <h2>Ebook</h2>
  <input id="tema" placeholder="tema">
  <button onclick="ebook()">Gerar</button>
</div>

<pre id="out"></pre>

<script>
function abrir(t){
  chatDiv.style.display="none";
  ebookDiv.style.display="none";
  if(t==="chat") chatDiv.style.display="block";
  if(t==="ebook") ebookDiv.style.display="block";
}

const chatDiv = document.getElementById("chat");
const ebookDiv = document.getElementById("ebook");

async function chat(){
  out.innerText="...";
  const r = await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mensagem:msg.value})
  });
  out.innerText = JSON.stringify(await r.json(),null,2);
}

async function ebook(){
  out.innerText="...";
  const r = await fetch("/api/ebook",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({tema:tema.value})
  });
  out.innerText = JSON.stringify(await r.json(),null,2);
}
</script>

</body>
</html>
