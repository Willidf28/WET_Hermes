<!DOCTYPE html>
<html>
<head>
  <title>Hermes IA</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    button { margin: 5px; }
    .aba { display: none; }
    .ativa { display: block; }
  </style>
</head>
<body>

<h1>Hermes IA</h1>

<button onclick="mostrar('chat')">Chat IA</button>
<button onclick="mostrar('ebook')">Ebook</button>

<div id="chat" class="aba ativa">
  <h2>Chat</h2>
  <textarea id="input"></textarea><br>
  <button onclick="chat()">Enviar</button>
</div>

<div id="ebook" class="aba">
  <h2>Ebook</h2>
  <input id="tema" placeholder="Tema"><br>
  <button onclick="ebook()">Gerar Ebook</button>
</div>

<pre id="resposta"></pre>

<script>
function mostrar(id){
  document.querySelectorAll('.aba').forEach(e=>e.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

async function chat(){
  const mensagem = document.getElementById("input").value;

  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ mensagem })
  });

  const data = await res.json();
  document.getElementById("resposta").innerText = data.resposta;
}

async function ebook(){
  const tema = document.getElementById("tema").value;

  const res = await fetch("/api/ebook", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ tema })
  });

  const data = await res.json();
  document.getElementById("resposta").innerText = data.ebook;
}
</script>

</body>
</html>
